<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <nav>
        <a class="glow" href="index.html">Midnight</a>
        <div class="profile">
            <a href="profile.html"><img src="pfps/temp-pfp.png"></a>
        </div>
    </nav>
    <main>
        <section class="login-box">
            <h1 class="glow">Sign up</h1>
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password">
            <label for="password2">Confirm Password</label>
            <input id="password2" type="password" placeholder="Repeat password">
            <label>Profile visibility</label>
            <label><input type="radio" name="visibility" value="public" checked> Public</label>
            <label><input type="radio" name="visibility" value="private"> Private</label>
            <label for="pfp">Upload profile picture</label>
            <input id="pfp" type="file" accept="image/*">
            <button id="register-btn">Register</button>
            <a href="login.html">Sign in</a>
        </section>
    </main>
    <footer>       
         <section class="top">
            <section class="about">
                <h3 class="gray-glow">Project Midnight</h3>
                <p class="gray-glow">Times are rough nowdays... everyone needs to vent a little from time to time.</p>
            </section>
            <section class="socials">
                <h3 class="gray-glow">My Socials:</h3>
                <a class="gray-glow" href="https://www.instagram.com/mr.lorix/"><i class="fa-brands fa-instagram"></i> <p> mr.lorix</p></a>
                <a class="gray-glow"><i class="fa-brands fa-discord"></i> <p> .lorix</p></a>
            </section>
        </section>
        <section class="bottom">
            <p>© 2025 Lorix. All rights reserved.</p>
        </section></footer>
    <script src="scripts/supabaseClient.js" type="module"></script>
    <script src="scripts/nav-profile.js" type="module"></script>
    <script src="scripts/register.js" type="module"></script>
</body>
</html>
