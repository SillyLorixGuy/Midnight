<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://api.ssps.cajthaml.eu/file/64d9f18f79dad891e8a07c73">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <nav>
        <a class="glow70" href="index.html">Midnight</a>
        <div class="profile">
            <a href="profile.html"><img src="pfps/temp-pfp.png"></a>
        </div>
    </nav>
    <main>
        <section class="login-box">
            <h1 class="glow70">Sign up</h1>
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter email">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password">
            <label for="password2">Confirm Password</label>
            <input id="password2" type="password" placeholder="Repeat password">
            <label>Profile visibility</label>
            <label><input type="radio" name="visibility" value="public" checked> Public</label>
            <label><input type="radio" name="visibility" value="private"> Private</label>
            <label for="pfp">Upload profile picture</label>
            <input id="pfp" type="file" accept="image/*">
            <button id="register-btn">Register</button>
            <a href="login.html">Sign in</a>
        </section>
    </main>
    <footer></footer>
    <script src="scripts/supabaseClient.js" type="module"></script>
    <script src="scripts/register.js" type="module"></script>
</body>
</html>
