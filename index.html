<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://api.ssps.cajthaml.eu/file/64d9f18f79dad891e8a07c73">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <title>Project Midnight</title>
</head>

<body>
    <nav>
        <a class="glow70" href="index.html">Midnight</a>
        <div class="profile">
            <a href="profile.html"><img src="temp-pfp.png"></a> <!-- pfp taken from some database -->
        </div>
    </nav>
    <main>
        <section class="content">
            <p class="glow"></p>
            <div class="container">
                <div class="date-inputs">
                    <label>Use current date</label><input type="radio" id="current-day" name="date-selector" checked>
                    <label>Use past date</label><input type="radio" id="past-day" name="date-selector">
                    <input type="number" id="entry-date-day" placeholder="DD">
                    <input type="number" id="entry-date-month" placeholder="MM">
                    <input type="number" id="entry-date-year" placeholder="YYYY">
                    <p class="error">*ERROR - invalid date*</p>
                </div>
                <section class="entry-input">
                    <input type="text" placeholder="Have a title for today?">
                <textarea name="diary-entry" id="entry" placeholder="What happened today?"></textarea>
                </section>
                <div class="submit-section">
                    <div class="mood-input">
                        <p class="glow70">How was today?</p>
                        <input type="number" id="mood" name="mood" min="0" max="100" step="1" required>
                    </div>
                    <button>
                        <p>Submit</p>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <a href=""></a>
    </footer>
    <script src="scripts/entry-logger.js"></script>
</body>

</html>
