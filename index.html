<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/index.css">
    <title>Project Midnight</title>
</head>

<body>
    <nav>
        <a class="glow" href="index.html">Midnight</a>
        <div class="profile">
            <a href="profile.html"><img src="https://aifxjrcbxtvblqhgsrbs.supabase.co/storage/v1/object/public/pfps/anonymous-avatar-icon-25.jpg"></a> <!-- pfp taken from some database -->
            <button id="logout-btn" aria-label="Logout" title="Logout">Logout <i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>
    </nav>
    <main>
        <section class="content">
            <p class="glow"></p>
            <div class="container">
                <div class="date-inputs">
                    <div>
                        <label>Use current date</label><input type="radio" id="current-day" name="date-selector"
                            checked>
                        <label>Use past date</label><input type="radio" id="past-day" name="date-selector">
                    </div>
                    <div class="date"><input type="number" id="entry-date-day" placeholder="DD">
                        <input type="number" id="entry-date-month" placeholder="MM">
                        <input type="number" id="entry-date-year" placeholder="YYYY">
                    </div>
                    <p class="error">*ERROR - invalid date*</p>
                </div>
                <section class="entry-input">
                    <input type="text" placeholder="Have a title for today?">
                    <textarea name="diary-entry" id="entry" placeholder="What happened today?"></textarea>
                </section>
                <div class="submit-section">
                    <div class="mood-input">
                        <p class="glow">How was today?</p>
                        <input type="number" id="mood" name="mood" min="0" max="100" step="1" required>
                    </div>
                    <button id="submit-button">
                        <p>Submit</p>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <section class="top">
            <section class="about">
                <h3 class="gray-glow">Project Midnight</h3>
                <p class="gray-glow">Times are rough nowdays... everyone needs to vent a little from time to time.</p>
            </section>
            <section class="socials">
                <h3 class="gray-glow">My Socials:</h3>
                <a class="gray-glow" href="https://www.instagram.com/mr.lorix/"><i class="fa-brands fa-instagram"></i> <p> mr.lorix</p></a>
                <a class="gray-glow"><i class="fa-brands fa-discord"></i> <p> .lorix</p></a>
            </section>
        </section>
        <section class="bottom">
            <p>© 2025 Lorix. All rights reserved.</p>
        </section>
    </footer>
    <script src="scripts/supabaseClient.js" type="module"></script>
    <script src="scripts/nav-profile.js" type="module"></script>
<script type="module">
  import { isUserLoggedIn } from './scripts/supabaseClient.js';

  (async function() {
    const loggedIn = await isUserLoggedIn();
    if (!loggedIn) {
      window.location.href = 'login.html';
    }
  })();
</script>
    <script src="scripts/entry-logger.js" type="module"></script>
</body>

</html>
